  cardTitle: '家族の目で、\n仕事が誇りに変わった日。',

  panels: [
  { size: 'half', caption: '謎解きイベント', bubble: { text: '…あの人、\n怖そう', pos: 'tl' }, charPos: 'left', bg: '#fff' },
  { size: 'half', caption: '30分後——', bubble: { text: 'これが答えだ！', pos: 'tr' }, charPos: 'right', bg: '#FEF0F0', drama: true },
  { size: 'full', caption: '翌週、オフィスで', bubble: { text: 'あの件、相談\nしていいですか？', pos: 'tl' }, charPos: 'left', bg: '#f8f8f8', label: '先週は話せなかった二人が、自然に話しかけ合っている' }],

function Panel({ p, color }) {
  const { mangaQuality } = useContext(TweaksCtx);
  const bw = (mangaQuality * 0.6 + 0.8).toFixed(1);
  const hOpacity = ((mangaQuality - 1) * 0.022).toFixed(3);
  const hSize = 5 + mangaQuality * 1.5;
  const minH = p.size === 'full' ? 115 : 95;
  return (
    <div style={{ position: 'relative', background: p.bg || '#fff', border: `${bw}px solid #111`, minHeight: minH, overflow: 'hidden', flex: p.size === 'wide' ? 2 : 1 }}>
      <div style={{ position: 'absolute', inset: 0, pointerEvents: 'none', backgroundImage: `repeating-linear-gradient(45deg,transparent,transparent ${hSize}px,rgba(0,0,0,${hOpacity}) ${hSize}px,rgba(0,0,0,${hOpacity}) ${hSize + 1}px)` }} />
      {p.drama && <div style={{ position: 'absolute', inset: 0, background: `radial-gradient(ellipse at 50% 60%, ${color}18, transparent 70%)` }} />}
      {p.charPos &&
      <div style={{ position: 'absolute', bottom: 0, left: p.charPos === 'right' ? 'auto' : p.charPos === 'center' ? '50%' : 20, right: p.charPos === 'right' ? 20 : 'auto', transform: p.charPos === 'center' ? 'translateX(-50%)' : 'none', width: p.charPos === 'center' ? 40 : 30, height: p.charPos === 'center' ? 65 : 52, background: 'rgba(0,0,0,0.13)', borderRadius: '50% 50% 0 0' }} />
      }
      {p.bubble &&
      <div style={{ position: 'absolute', top: p.bubble.pos.includes('t') ? 6 : 'auto', bottom: p.bubble.pos.includes('b') ? 8 : 'auto', left: p.bubble.pos.includes('l') ? 6 : 'auto', right: p.bubble.pos.includes('r') ? 6 : 'auto', background: '#fff', border: '1.5px solid #111', borderRadius: 8, padding: '4px 7px', fontSize: 10, fontWeight: 700, lineHeight: 1.35, whiteSpace: 'pre-line', maxWidth: '65%', zIndex: 3 }}>{p.bubble.text}</div>
      }
      {p.caption && <div style={{ position: 'absolute', top: 0, left: 0, right: 0, background: 'rgba(0,0,0,0.78)', color: '#fff', fontSize: 9, fontWeight: 700, padding: '3px 8px', lineHeight: 1.4, zIndex: 3 }}>{p.caption}</div>}
      {p.label && <div style={{ position: 'absolute', bottom: 5, left: 7, right: 7, fontSize: 8, color: 'rgba(0,0,0,0.3)', fontWeight: 700, lineHeight: 1.3 }}>{p.label}</div>}
    </div>);

}

function MangaPages({ story }) {
  // Real images
  if (story.images && story.images.length > 0) {
    return (
      <div style={{ padding: '14px 14px 0', display: 'grid', gap: 3 }}>
        {story.images.map((src, i) => (
          <img key={i} src={src} alt={`page ${i + 1}`} style={{ width: '100%', display: 'block', border: '2.5px solid #111' }}/>
        ))}
      </div>
    );
  }
  // Wireframe panels
  const panels = story.panels;
  const rows = [];
  let i = 0;
  while (i < panels.length) {
    const p = panels[i];
    if (p.size === 'full') {rows.push([p]);i++;} else
    if (i + 1 < panels.length) {rows.push([p, panels[i + 1]]);i += 2;} else
    {rows.push([p]);i++;}
  }
  return (
    <div style={{ display: 'grid', gap: 3, padding: '14px 14px 0' }}>
      {rows.map((row, ri) =>
      <div key={ri} style={{ display: 'flex', gap: 3 }}>
          {row.map((p, pi) => <Panel key={pi} p={p} color={story.color} />)}
        </div>
      )}
    </div>);

}

function ColumnBox({ story }) {
  return (
    <div style={{ margin: '14px 14px 20px', border: '2.5px solid #111', borderRadius: 6, overflow: 'hidden' }}>
      <div style={{ background: story.color, color: '#fff', padding: '10px 14px', borderBottom: '2px solid #111', display: 'flex', gap: 8, alignItems: 'center', fontSize: 12, fontWeight: 900 }}>
        <span style={{ fontSize: 18 }}>{story.column.icon}</span>
        COLUMN {story.id} — {story.column.heading}
      </div>
      <div style={{ background: '#fff', padding: '14px 16px', fontSize: 11, lineHeight: 1.85, color: '#333' }}>
        {story.column.body}
      </div>
    </div>);

}

function StoryModal({ story, stories, onClose, onNavigate }) {
  const scrollRef = useRef(null);
  const idx = stories.findIndex((s) => s.id === story.id);
  useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = 0;
  }, [story.id]);

  return (
    <div style={{ position: 'fixed', inset: 0, zIndex: 200, display: 'flex', alignItems: 'flex-end', background: 'rgba(0,0,0,0.5)' }}
    onClick={(e) => {if (e.target === e.currentTarget) onClose();}}>
      <div ref={scrollRef} style={{ width: '100%', maxWidth: 430, maxHeight: '92vh', background: '#fafaf8', borderRadius: '16px 16px 0 0', border: '2.5px solid #111', borderBottom: 'none', overflowY: 'auto', animation: 'sheetUp 0.28s cubic-bezier(0.22,1,0.36,1)', margin: '0 auto' }}>
        <div style={{ position: 'sticky', top: 0, zIndex: 10, background: story.color, borderBottom: '2.5px solid #111', padding: '14px 16px 12px' }}>
          <div style={{ display: 'flex', alignItems: 'flex-start', gap: 12 }}>
            <button onClick={onClose} style={{ width: 34, height: 34, borderRadius: '50%', background: '#fff', border: '2px solid #111', fontSize: 16, fontWeight: 900, cursor: 'pointer', flexShrink: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', marginTop: 2 }}>←</button>
            <div>
              <div style={{ color: 'rgba(255,255,255,0.75)', fontSize: 10, fontWeight: 700, letterSpacing: '0.1em', marginBottom: 3 }}>STORY {story.id}</div>
              <div style={{ color: '#fff', fontSize: 17, fontWeight: 900, lineHeight: 1.35, whiteSpace: 'pre-line' }}>{story.cardTitle}</div>
            </div>
          </div>
          <div style={{ display: 'flex', gap: 4, marginTop: 12 }}>
            {stories.map((s, i) =>
            <div key={s.id} onClick={() => onNavigate(s)} style={{ flex: 1, height: 4, borderRadius: 2, cursor: 'pointer', background: i <= idx ? '#fff' : 'rgba(255,255,255,0.3)', transition: 'background 0.2s' }} />
            )}
          </div>
        </div>
        <MangaPages story={story} />
        <ColumnBox story={story} />
        {(() => {
          const next = stories[idx + 1];
          return next ?
          <div style={{ padding: '0 14px 28px' }}>
              <div style={{ fontSize: 11, color: '#888', fontWeight: 700, marginBottom: 8 }}>NEXT STORY ▸</div>
              <div onClick={() => onNavigate(next)} style={{ border: '2.5px solid #111', borderRadius: 8, overflow: 'hidden', display: 'flex', cursor: 'pointer', boxShadow: '3px 3px 0 #111', background: '#fff' }}>
                <div style={{ width: 64, background: next.color, borderRight: '2.5px solid #111', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 4, padding: 10, flexShrink: 0 }}>
                  <div style={{ fontFamily: 'Bangers, cursive', fontSize: 22, color: '#fff', lineHeight: 1 }}>{next.id}</div>
                  <div style={{ fontSize: 20 }}>{next.emoji}</div>
                </div>
                <div style={{ padding: '12px 14px', flex: 1 }}>
                  <div style={{ fontSize: 11, color: next.color, fontWeight: 700, marginBottom: 4 }}>次の話を読む</div>
                  <div style={{ fontSize: 13, fontWeight: 900, lineHeight: 1.4, whiteSpace: 'pre-line' }}>{next.cardTitle}</div>
                </div>
              </div>
            </div> :

          <div style={{ padding: '0 14px 28px' }}>
              <div style={{ background: '#111', borderRadius: 10, padding: '22px 18px', textAlign: 'center' }}>
                <div style={{ color: C.yellow, fontSize: 11, fontWeight: 700, letterSpacing: '0.08em', marginBottom: 6 }}>3つの物語を読み終えました</div>
                <div style={{ color: '#fff', fontSize: 15, fontWeight: 900, lineHeight: 1.45, marginBottom: 14 }}>あなたの組織に、変化のきっかけを。</div>
                <button style={{ width: '100%', background: C.red, color: '#fff', border: '2.5px solid #fff', borderRadius: 6, padding: '14px', fontSize: 14, fontWeight: 900, cursor: 'pointer' }}>✉️ 無料相談を予約する</button>
              </div>
            </div>;

        })()}
      </div>
      <style>{`@keyframes sheetUp { from { transform:translateY(60px);opacity:0; } to { transform:none;opacity:1; } }`}</style>
    </div>);

}

function StoryCard({ story, onClick, compact }) {
  const [pressed, setPressed] = useState(false);
  const { mangaQuality } = useContext(TweaksCtx);
  const bw = (mangaQuality * 0.6 + 0.8).toFixed(1) + 'px';
  const thumbH = compact ? 72 : 100;
  const cs = story.comingSoon;

  return (
    <div
      onClick={cs ? undefined : onClick}
      onMouseDown={() => !cs && setPressed(true)}
      onMouseUp={() => setPressed(false)}
      onTouchStart={() => !cs && setPressed(true)}
      onTouchEnd={() => setPressed(false)}
      style={{ border: `${bw} solid #111`, borderRadius: 8, overflow: 'hidden', cursor: cs ? 'default' : 'pointer', background: cs ? '#f5f5f5' : '#fff', boxShadow: (!cs && pressed) ? '1px 1px 0 #111' : '4px 4px 0 #111', transform: (!cs && pressed) ? 'translate(3px,3px)' : 'none', transition: 'box-shadow 0.08s, transform 0.08s', position: 'relative', opacity: cs ? 0.85 : 1 }}>
      {/* thumb */}
      <div style={{ height: thumbH, background: cs ? '#e8e8e8' : story.bgLight, borderBottom: `${bw} solid #111`, position: 'relative', overflow: 'hidden', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        {story.thumbImage && !cs
          ? <img src={story.thumbImage} alt="thumb" style={{ width: '100%', height: '100%', objectFit: 'cover', objectPosition: 'top center' }}/>
          : <div style={{ fontSize: 36, filter: cs ? 'grayscale(1)' : 'none' }}>{story.emoji}</div>
        }
        <div style={{ position: 'absolute', top: 0, left: 0, background: cs ? '#888' : story.color, color: '#fff', fontFamily: 'Bangers, cursive', fontSize: 18, lineHeight: 1, padding: '3px 8px', borderBottom: `2px solid #111`, borderRight: `2px solid #111` }}>{story.id}</div>
        {cs && (
          <div style={{ position: 'absolute', top: 0, right: 0, background: '#111', color: '#fff', fontSize: 9, fontWeight: 900, padding: '4px 8px', letterSpacing: '0.08em' }}>
            COMING SOON
          </div>
        )}
      </div>
      <div style={{ padding: compact ? '10px 10px 0' : '12px 14px 0' }}>
        <div style={{ fontSize: 10, color: cs ? '#888' : story.color, fontWeight: 700, marginBottom: 4 }}>STORY {story.id}</div>
        <div style={{ fontSize: compact ? 12 : 14, fontWeight: 900, lineHeight: 1.35, whiteSpace: 'pre-line', marginBottom: compact ? 4 : 6, color: cs ? '#555' : '#111' }}>{story.cardTitle}</div>
        {!compact && <div style={{ fontSize: 11, color: '#888', lineHeight: 1.55, marginBottom: 2 }}>{story.cardSub}</div>}
      </div>
      <div style={{ borderTop: `${bw} solid #111`, padding: '8px 14px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', background: cs ? '#eee' : story.bgLight }}>
        {cs
          ? <span style={{ fontSize: 11, fontWeight: 700, color: '#888' }}>🔒 公開準備中…</span>
          : <>
              <span style={{ fontSize: 11, fontWeight: 700, color: story.color }}>マンガを読む</span>
              <div style={{ width: 24, height: 24, borderRadius: '50%', background: story.color, border: '2px solid #111', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', fontSize: 13, fontWeight: 900 }}>›</div>
            </>
